name: Deploy to Cloud Run

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: read
  id-token: write

env:
  REGION: southamerica-east1
  SERVICE: stockapp-backend
  IMAGE: southamerica-east1-docker.pkg.dev/stockapp-dgbarreto/stockapp/stockapp-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1024353973147/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@stockapp-dgbarreto.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker southamerica-east1-docker.pkg.dev --quiet

      - name: Build image
        run: |
          docker build --platform linux/amd64 \
            -t ${{ env.IMAGE }}:${{ env.RELEASE_VERSION }} \
            -t ${{ env.IMAGE }}:latest .

      - name: Push image
        run: |
          docker push ${{ env.IMAGE }}:${{ env.RELEASE_VERSION }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ env.RELEASE_VERSION }} \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --set-env-vars=DATABASE_URL=${{ secrets.DATABASE_URL }},BOLSAI_API_KEY=${{ secrets.BOLSAI_API_KEY }}